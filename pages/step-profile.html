<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suas Informações | CvPorVaga</title>
    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.js"></script>
</head>

<body>
    <script type="module">
        import { injectStepHeader, injectStepFooter } from '/src/lib/layout.js';
        import { getState, updateProfile } from '/src/lib/store.js';
        import { extractTextFromPDF } from '/src/lib/pdf.js';
        import { parseProfileFromText } from '/src/prompts/parse-profile.js';

        injectStepHeader({ step: 4, backHref: '/pages/step-frequency.html' });
        injectStepFooter();

        // Load existing data
        const state = getState();
        const p = state.profile;
        if (p.name) document.getElementById('name').value = p.name;
        if (p.email) document.getElementById('email').value = p.email;
        if (p.phone) document.getElementById('phone').value = p.phone;
        if (p.location) document.getElementById('location').value = p.location;
        if (p.summary) document.getElementById('summary').value = p.summary;

        // Utility: Render dynamic lists
        function renderArr(arr, listId, badgeId, tplFn) {
            document.getElementById(badgeId).textContent = arr.length;
            document.getElementById(listId).innerHTML = arr.map(tplFn).join('');
        }

        const renderAccordionHeader = (title, subtitle, expanded, index, type) => `
            <div class="${type}-header" data-index="${index}" style="padding:1rem 1.25rem; cursor:pointer; display:flex; justify-content:space-between; align-items:center; background:${expanded ? 'white' : 'var(--color-gray-50)'};">
                <div>
                    <h4 style="font-weight:700; font-size:1rem; color:var(--color-gray-900); margin-bottom:0.125rem;">${title}</h4>
                    <p style="font-size:0.8125rem; color:var(--color-gray-500); margin:0;">${subtitle}</p>
                </div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-gray-400); transform: ${expanded ? 'rotate(180deg)' : 'rotate(0deg)'}; transition: transform 0.2s;"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
        `;

        const renderRemoveBtn = (type, idx) => `
            <div style="display:flex; justify-content:flex-end;">
                <button class="btn-remove" data-type="${type}" data-index="${idx}" style="background:transparent; border:none; color:var(--color-error); font-weight:600; font-size:0.875rem; display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> Remover
                </button>
            </div>
        `;

        function renderExperiences() {
            const exps = getState().profile.experiences || [];
            renderArr(exps, 'experiences-list', 'badge-exp', (exp, idx) => `
                <div style="border:1px solid var(--color-gray-300); border-radius:var(--radius-md); overflow:hidden;  margin-bottom:1rem;">
                    ${renderAccordionHeader(exp.title || 'Cargo não definido', `${exp.company || 'Empresa'} • ${exp.startDate || 'Início'} - ${exp.isCurrent ? 'Atual' : (exp.endDate || 'Fim')}`, exp._expanded, idx, 'exp')}
                    <div style="display: ${exp._expanded ? 'block' : 'none'}; padding:1.25rem; border-top:1px solid var(--color-gray-200);">
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
                            <input class="form-input ds-input" data-type="exp" data-field="title" data-index="${idx}" value="${exp.title || ''}" placeholder="Cargo">
                            <input class="form-input ds-input" data-type="exp" data-field="company" data-index="${idx}" value="${exp.company || ''}" placeholder="Empresa">
                            <input class="form-input ds-input" data-type="exp" data-field="startDate" data-index="${idx}" value="${exp.startDate || ''}" placeholder="Início (Mês/Ano)">
                            <div style="display:flex; align-items:center; gap:0.75rem;">
                                <input class="form-input ds-input" style="flex:1;" data-type="exp" data-field="endDate" data-index="${idx}" value="${exp.endDate || ''}" placeholder="Fim (Mês/Ano)" ${exp.isCurrent ? 'disabled' : ''}>
                                <label style="display:flex; align-items:center; gap:0.5rem; font-size:0.875rem; font-weight:600; cursor:pointer; color:var(--color-gray-700);">
                                    <input type="checkbox" class="ds-check" data-type="exp" data-field="isCurrent" data-index="${idx}" ${exp.isCurrent ? 'checked' : ''} style="width:1.25rem; height:1.25rem;"> Atual
                                </label>
                            </div>
                        </div>
                        <textarea class="form-input ds-input" data-type="exp" data-field="description" data-index="${idx}" placeholder="Descreva suas principais responsabilidades e conquistas..." style="min-height:6rem; margin-bottom:1rem;">${exp.description || ''}</textarea>
                        ${renderRemoveBtn('exp', idx)}
                    </div>
                </div>
            `);
        }

        function renderEducation() {
            const edus = getState().profile.education || [];
            renderArr(edus, 'education-list', 'badge-edu', (edu, idx) => `
                <div style="border:1px solid var(--color-gray-300); border-radius:var(--radius-md); overflow:hidden;  margin-bottom:1rem;">
                    ${renderAccordionHeader(edu.degree || 'Curso não definido', edu.institution || 'Instituição', edu._expanded, idx, 'edu')}
                    <div style="display: ${edu._expanded ? 'block' : 'none'}; padding:1.25rem; border-top:1px solid var(--color-gray-200);">
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
                            <input class="form-input ds-input" data-type="edu" data-field="degree" data-index="${idx}" value="${edu.degree || ''}" placeholder="Curso/Grau">
                            <input class="form-input ds-input" data-type="edu" data-field="institution" data-index="${idx}" value="${edu.institution || ''}" placeholder="Instituição">
                            <input class="form-input ds-input" data-type="edu" data-field="startDate" data-index="${idx}" value="${edu.startDate || ''}" placeholder="Início (Ano)">
                            <input class="form-input ds-input" data-type="edu" data-field="endDate" data-index="${idx}" value="${edu.endDate || ''}" placeholder="Conclusão (Ano)">
                        </div>
                        ${renderRemoveBtn('edu', idx)}
                    </div>
                </div>
            `);
        }

        function renderLanguages() {
            const langs = getState().profile.languages || [];
            renderArr(langs, 'languages-list', 'badge-lang', (lang, idx) => `
                <div style="border:1px solid var(--color-gray-300); border-radius:var(--radius-md); overflow:hidden;  margin-bottom:1rem;">
                    ${renderAccordionHeader(lang.name || 'Idioma não definido', lang.level || 'Nível não informado', lang._expanded, idx, 'lang')}
                    <div style="display: ${lang._expanded ? 'block' : 'none'}; padding:1.25rem; border-top:1px solid var(--color-gray-200);">
                        <div style="display:grid; gap:1rem; margin-bottom:1rem;">
                            <input class="form-input ds-input" data-type="lang" data-field="name" data-index="${idx}" value="${lang.name || ''}" placeholder="Idioma (ex: Inglês)">
                            <select class="form-input ds-input" data-type="lang" data-field="level" data-index="${idx}">
                                <option value="" ${!lang.level ? 'selected' : ''}>Selecione o nível</option>
                                <option value="Básico" ${lang.level === 'Básico' ? 'selected' : ''}>Básico</option>
                                <option value="Intermediário" ${lang.level === 'Intermediário' ? 'selected' : ''}>Intermediário</option>
                                <option value="Avançado" ${lang.level === 'Avançado' ? 'selected' : ''}>Avançado</option>
                                <option value="Fluente" ${lang.level === 'Fluente' ? 'selected' : ''}>Fluente</option>
                                <option value="Nativo" ${lang.level === 'Nativo' ? 'selected' : ''}>Nativo</option>
                            </select>
                        </div>
                        ${renderRemoveBtn('lang', idx)}
                    </div>
                </div>
            `);
        }

        function renderProjects() {
            const projs = getState().profile.projects || [];
            renderArr(projs, 'projects-list', 'badge-proj', (proj, idx) => `
                <div style="border:1px solid var(--color-gray-300); border-radius:var(--radius-md); overflow:hidden;  margin-bottom:1rem;">
                    ${renderAccordionHeader(proj.title || 'Novo projeto', proj.role || 'Papel no projeto', proj._expanded, idx, 'proj')}
                    <div style="display: ${proj._expanded ? 'block' : 'none'}; padding:1.25rem; border-top:1px solid var(--color-gray-200);">
                        <div style="display:grid; gap:1rem; margin-bottom:1rem;">
                            <input class="form-input ds-input" data-type="proj" data-field="title" data-index="${idx}" value="${proj.title || ''}" placeholder="Nome do Projeto">
                            <input class="form-input ds-input" data-type="proj" data-field="role" data-index="${idx}" value="${proj.role || ''}" placeholder="Seu Papel">
                        </div>
                        <textarea class="form-input ds-input" data-type="proj" data-field="description" data-index="${idx}" placeholder="Descreva o projeto e suas contribuições..." style="min-height:6rem; margin-bottom:1rem;">${proj.description || ''}</textarea>
                        ${renderRemoveBtn('proj', idx)}
                    </div>
                </div>
            `);
        }

        function renderCertifications() {
            const certs = getState().profile.certifications || [];
            renderArr(certs, 'certifications-list', 'badge-cert', (cert, idx) => `
                <div style="border:1px solid var(--color-gray-300); border-radius:var(--radius-md); overflow:hidden;  margin-bottom:1rem;">
                    ${renderAccordionHeader(cert.title || 'Nova certificação', cert.issuer || 'Instituição emissora', cert._expanded, idx, 'cert')}
                    <div style="display: ${cert._expanded ? 'block' : 'none'}; padding:1.25rem; border-top:1px solid var(--color-gray-200);">
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
                            <input class="form-input ds-input" style="grid-column: 1 / -1;" data-type="cert" data-field="title" data-index="${idx}" value="${cert.title || ''}" placeholder="Nome da Certificação">
                            <input class="form-input ds-input" data-type="cert" data-field="issuer" data-index="${idx}" value="${cert.issuer || ''}" placeholder="Instituição emissora">
                            <input class="form-input ds-input" data-type="cert" data-field="date" data-index="${idx}" value="${cert.date || ''}" placeholder="Data (Mês/Ano)">
                        </div>
                        ${renderRemoveBtn('cert', idx)}
                    </div>
                </div>
            `);
        }

        function renderSkills() {
            const skills = getState().profile.skills || [];
            document.getElementById('badge-skill').textContent = skills.length;

            let html = '<div style="display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:1rem;">';
            html += skills.map((s, i) => `
                <span style="display:inline-flex; align-items:center; gap:0.5rem; padding:0.375rem 0.75rem; border:1px solid var(--color-gray-300); border-radius:1rem; font-size:0.875rem; font-weight:500; color:var(--color-gray-700);  box-shadow:0 1px 2px rgba(0,0,0,0.05);">
                    ${s}
                    <button class="btn-remove-skill" data-index="${i}" style="background:transparent; border:none; color:var(--color-gray-400); cursor:pointer; padding:0; display:flex; align-items:center; transition:color 0.2s;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </span>
            `).join('');
            html += '</div>';
            document.getElementById('skills-list').innerHTML = html;
        }

        // Add Handlers (Button clicks)
        const addMap = {
            'btn-add-exp': { prop: 'experiences', fn: renderExperiences },
            'btn-add-edu': { prop: 'education', fn: renderEducation },
            'btn-add-lang': { prop: 'languages', fn: renderLanguages },
            'btn-add-proj': { prop: 'projects', fn: renderProjects },
            'btn-add-cert': { prop: 'certifications', fn: renderCertifications }
        };

        Object.entries(addMap).forEach(([id, config]) => {
            document.getElementById(id).addEventListener('click', () => {
                const arr = getState().profile[config.prop] || [];
                arr.push({ _expanded: true });
                updateProfile({ [config.prop]: arr });
                config.fn();
            });
        });

        // Skill Handlers
        function addSkill() {
            const input = document.getElementById('new-skill-input');
            const val = input.value.trim();
            if (val) {
                const skills = getState().profile.skills || [];
                skills.push(val);
                updateProfile({ skills });
                renderSkills();
                input.value = '';
            }
        }
        document.getElementById('btn-add-skill').addEventListener('click', addSkill);
        document.getElementById('new-skill-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); addSkill(); }
        });

        // Global Event Delegation for Expand/Remove
        document.addEventListener('click', (e) => {
            // Skill remove
            const bSkill = e.target.closest('.btn-remove-skill');
            if (bSkill) {
                const skills = getState().profile.skills;
                skills.splice(bSkill.dataset.index, 1);
                updateProfile({ skills });
                renderSkills();
                return;
            }

            // Accordion headers
            const headerTypes = ['exp', 'edu', 'lang', 'proj', 'cert'];
            for (let type of headerTypes) {
                const head = e.target.closest(`.${type}-header`);
                if (head) {
                    const propMap = { exp: 'experiences', edu: 'education', lang: 'languages', proj: 'projects', cert: 'certifications' };
                    const prop = propMap[type];
                    const arr = getState().profile[prop];
                    arr[head.dataset.index]._expanded = !arr[head.dataset.index]._expanded;
                    updateProfile({ [prop]: arr });
                    if (type === 'exp') renderExperiences();
                    if (type === 'edu') renderEducation();
                    if (type === 'lang') renderLanguages();
                    if (type === 'proj') renderProjects();
                    if (type === 'cert') renderCertifications();
                    return;
                }
            }

            // Accordion remove
            const btnRm = e.target.closest('.btn-remove');
            if (btnRm) {
                const { type, index } = btnRm.dataset;
                const propMap = { exp: 'experiences', edu: 'education', lang: 'languages', proj: 'projects', cert: 'certifications' };
                const prop = propMap[type];
                const arr = getState().profile[prop];
                arr.splice(index, 1);
                updateProfile({ [prop]: arr });
                if (type === 'exp') renderExperiences();
                if (type === 'edu') renderEducation();
                if (type === 'lang') renderLanguages();
                if (type === 'proj') renderProjects();
                if (type === 'cert') renderCertifications();
            }
        });

        // Input synchronizer
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('ds-input')) {
                const { type, field, index } = e.target.dataset;
                const propMap = { exp: 'experiences', edu: 'education', lang: 'languages', proj: 'projects', cert: 'certifications' };
                const prop = propMap[type];
                const state = getState();
                const obj = state.profile[prop][index];
                obj[field] = e.target.value;
                updateProfile(state.profile);

                // Partial update for smooth typing
                const h = document.querySelector(`.${type}-header[data-index="${index}"]`);
                if (h) {
                    if (type === 'exp') {
                        h.querySelector('h4').textContent = obj.title || 'Cargo não definido';
                        h.querySelector('p').textContent = `${obj.company || 'Empresa'} • ${obj.startDate || 'Início'} - ${obj.isCurrent ? 'Atual' : (obj.endDate || 'Fim')}`;
                    } else if (type === 'edu') {
                        h.querySelector('h4').textContent = obj.degree || 'Curso não definido';
                        h.querySelector('p').textContent = obj.institution || 'Instituição';
                    } else if (type === 'lang') {
                        h.querySelector('h4').textContent = obj.name || 'Idioma não definido';
                        h.querySelector('p').textContent = obj.level || 'Nível não informado';
                    } else if (type === 'proj') {
                        h.querySelector('h4').textContent = obj.title || 'Novo projeto';
                        h.querySelector('p').textContent = obj.role || 'Papel no projeto';
                    } else if (type === 'cert') {
                        h.querySelector('h4').textContent = obj.title || 'Nova certificação';
                        h.querySelector('p').textContent = obj.issuer || 'Instituição emissora';
                    }
                }
            }
        });

        // Checkbox synchronizer
        document.addEventListener('change', (e) => {
            if (e.target.classList.contains('ds-check')) {
                const { type, field, index } = e.target.dataset;
                if (type === 'exp') {
                    const state = getState();
                    const obj = state.profile.experiences[index];
                    obj[field] = e.target.checked;
                    if (e.target.checked) obj.endDate = '';
                    updateProfile(state.profile);
                    renderExperiences();
                }
            }
        });

        // Init all rendering
        renderExperiences();
        renderEducation();
        renderSkills();
        renderLanguages();
        renderProjects();
        renderCertifications();

        // Top Level Form Save
        document.getElementById('btn-continue').addEventListener('click', (e) => {
            e.preventDefault();
            updateProfile({
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                location: document.getElementById('location').value,
                summary: document.getElementById('summary').value
            });
            window.location.href = '/pages/step-job.html';
        });

        // Import Logic
        const importBtn = document.getElementById('btn-import');
        const fileInput = document.getElementById('file-upload');
        const importStatus = document.getElementById('import-status');

        importBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            importBtn.style.display = 'none';
            importStatus.style.display = 'flex';
            importStatus.innerHTML = '<div class="spinner" style="width:1.25rem;height:1.25rem;border-width:2px;"></div> <span style="font-size:0.875rem;font-weight:700;">Lendo arquivo...</span>';

            try {
                const text = await extractTextFromPDF(file);
                importStatus.innerHTML = '<div class="spinner" style="width:1.25rem;height:1.25rem;border-width:2px;border-top-color:var(--color-primary);"></div> <span style="font-size:0.875rem;font-weight:700;">Analisando com IA...</span>';

                const profileData = await parseProfileFromText(text);

                if (profileData.name) document.getElementById('name').value = profileData.name;
                if (profileData.email) document.getElementById('email').value = profileData.email;
                if (profileData.phone) document.getElementById('phone').value = profileData.phone;
                if (profileData.location) document.getElementById('location').value = profileData.location;
                if (profileData.summary) document.getElementById('summary').value = profileData.summary;

                // Append any existing non-empty expanded properties properly
                const props = ['experiences', 'education', 'languages', 'projects', 'certifications'];
                props.forEach(prop => {
                    profileData[prop] = (profileData[prop] || []).map(item => ({ ...item, _expanded: false }));
                });

                updateProfile(profileData);

                // Re-render all
                renderExperiences();
                renderEducation();
                renderSkills();
                renderLanguages();
                renderProjects();
                renderCertifications();

                importStatus.innerHTML = '<span style="color:var(--color-success);font-weight:700;font-size:0.875rem;"><i class="pi pi-check-circle" style="margin-right:0.25rem;"></i> Dados importados com sucesso!</span>';

                setTimeout(() => {
                    importStatus.style.display = 'none';
                    importBtn.style.display = 'flex';
                }, 4000);

            } catch (err) {
                console.error(err);
                importStatus.innerHTML = `<span style="color:var(--color-error);font-weight:700;font-size:0.875rem;">Erro: ${err.message}</span>`;
                setTimeout(() => {
                    importStatus.style.display = 'none';
                    importBtn.style.display = 'flex';
                }, 4000);
            } finally {
                fileInput.value = '';
            }
        });
    </script>

    <main class="page-content step-content"
        style="max-width:var(--max-width);margin:0 auto;padding-left:1rem;padding-right:1rem;">
        <div style="text-align:center;margin-bottom:2rem;">
            <h2 style="font-size:1.5rem;font-weight:700;">Suas Informações</h2>
            <p style="color:var(--color-gray-500);font-weight:500;">Mantenha seu perfil atualizado para obter os
                melhores resultados.</p>
        </div>

        <div class="space-y-6">
            <!-- Import Section -->
            <div class="card" style="padding:1.5rem; border: 1px solid var(--color-gray-200);">
                <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
                    <div
                        style="width:3rem;height:3rem;border-radius:var(--radius-md);background:#dcfce7;color:#16a34a;display:flex;align-items:center;justify-content:center;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 13v8"></path>
                            <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path>
                            <path d="m8 17 4 4 4-4"></path>
                        </svg>
                    </div>
                    <div>
                        <h3 style="font-weight:700;font-size:1.125rem;">Importar Dados</h3>
                        <p style="font-size:0.8125rem;color:var(--color-gray-500);font-weight:500;">Substitua seus dados
                            via LinkedIn ou PDF</p>
                    </div>
                </div>
                <input type="file" id="file-upload" accept="application/pdf" style="display:none;">
                <button id="btn-import"
                    style="width:100%;height:3rem;border-radius:var(--radius-md);border:1px solid var(--color-gray-300);font-weight:700;font-size:0.875rem;color:var(--color-gray-700);display:flex;align-items:center;justify-content:center;gap:0.5rem;cursor:pointer;transition:background 0.2s;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path>
                        <path d="M12 12v9"></path>
                        <path d="m8 17 4 4 4-4"></path>
                    </svg>
                    Importar do LinkedIn ou PDF
                </button>
                <div id="import-status"
                    style="display:none;align-items:center;justify-content:center;gap:0.75rem;width:100%;height:3rem;border-radius:var(--radius-md);border:1px solid var(--color-gray-200);">
                </div>
            </div>

            <!-- Personal Data -->
            <div class="card" style="padding:1.5rem;">
                <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;">
                    <div
                        style="width:2.5rem;height:2.5rem;border-radius:var(--radius-sm);border:1px solid var(--color-gray-400);color:var(--color-gray-900);background:transparent;display:flex;align-items:center;justify-content:center;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <h3 style="font-weight:700;">Dados Pessoais</h3>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                    <div>
                        <label class="form-label" for="name">Nome Completo</label>
                        <input class="form-input" id="name" placeholder="Seu nome completo">
                    </div>
                    <div>
                        <label class="form-label" for="email">Email</label>
                        <input class="form-input" id="email" type="email" placeholder="seu@email.com">
                    </div>
                    <div>
                        <label class="form-label" for="phone">Telefone</label>
                        <input class="form-input" id="phone" placeholder="(00) 00000-0000">
                    </div>
                    <div>
                        <label class="form-label" for="location">Localização</label>
                        <input class="form-input" id="location" placeholder="Cidade, Estado">
                    </div>
                </div>
                <div style="margin-top:1rem;">
                    <label class="form-label" for="summary">Resumo Profissional</label>
                    <textarea class="form-input" id="summary"
                        placeholder="Descreva brevemente sua experiência e objetivos profissionais..."
                        style="min-height:5rem;"></textarea>
                </div>
            </div>

            <!-- Skills -->
            <div class="card" style="padding:1.5rem;">
                <div style="display:flex;align-items:center;margin-bottom:1.25rem;">
                    <div style="display:flex;align-items:center;gap:0.75rem;">
                        <div
                            style="width:2.5rem;height:2.5rem;border-radius:var(--radius-sm);background:#fefce8;color:#ca8a04;display:flex;align-items:center;justify-content:center;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                <line x1="12" y1="17" x2="12.01" y2="17"></line>
                            </svg>
                        </div>
                        <div style="display:flex;align-items:center;gap:0.5rem;">
                            <h3 style="font-weight:700;">Habilidades</h3>
                            <span class="badge" id="badge-skill">0</span>
                        </div>
                    </div>
                </div>
                <!-- Skill List -->
                <div id="skills-list"></div>
                <!-- Add Skill Input -->
                <div
                    style="display:flex; align-items:center; gap:0.5rem; border-top:1px dashed var(--color-gray-200); padding-top:1rem;">
                    <input id="new-skill-input" class="form-input" placeholder="Adicionar nova habilidade..."
                        style="flex:1;">
                    <button id="btn-add-skill"
                        style="width:3rem; height:3rem; border-radius:var(--radius-md); background:var(--color-primary); color:white; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Experiences Builder -->
            <div class="card" style="padding:1.5rem;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
                    <div style="display:flex;align-items:center;gap:0.75rem;">
                        <div
                            style="width:2.5rem;height:2.5rem;border-radius:var(--radius-sm);border:1px solid var(--color-gray-400);color:var(--color-gray-900);background:transparent;display:flex;align-items:center;justify-content:center;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                                <rect width="20" height="14" x="2" y="6" rx="2"></rect>
                            </svg>
                        </div>
                        <div style="display:flex;align-items:center;gap:0.5rem;">
                            <h3 style="font-weight:700;">Experiências</h3>
                            <span class="badge" id="badge-exp">0</span>
                        </div>
                    </div>
                    <button id="btn-add-exp"
                        style="background:var(--color-gray-900);color:var(--color-gray-50);border:none;padding:0.4rem 1rem;border-radius:0.5rem;font-weight:700;font-size:0.8125rem;cursor:pointer;display:flex;align-items:center;gap:0.25rem;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg> Adicionar
                    </button>
                </div>
                <div id="experiences-list"></div>
            </div>

            <!-- Education Builder -->
            <div class="card" style="padding:1.5rem;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
                    <div style="display:flex;align-items:center;gap:0.75rem;">
                        <div
                            style="width:2.5rem;height:2.5rem;border-radius:var(--radius-sm);background:#faf5ff;color:#9333ea;display:flex;align-items:center;justify-content:center;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z">
                                </path>
                                <path d="M22 10v6"></path>
                                <path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"></path>
                            </svg>
                        </div>
                        <div style="display:flex;align-items:center;gap:0.5rem;">
                            <h3 style="font-weight:700;">Formação Acadêmica</h3>
                            <span class="badge" id="badge-edu">0</span>
                        </div>
                    </div>
                    <button id="btn-add-edu"
                        style="background:var(--color-gray-900);color:var(--color-gray-50);border:none;padding:0.4rem 1rem;border-radius:0.5rem;font-weight:700;font-size:0.8125rem;cursor:pointer;display:flex;align-items:center;gap:0.25rem;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg> Adicionar
                    </button>
                </div>
                <div id="education-list"></div>
            </div>

            <!-- Languages Builder -->
            <div class="card" style="padding:1.5rem;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
                    <div style="display:flex;align-items:center;gap:0.75rem;">
                        <div
                            style="width:2.5rem;height:2.5rem;border-radius:var(--radius-sm);background:#fdf2f8;color:#db2777;display:flex;align-items:center;justify-content:center;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="m5 8 6 6"></path>
                                <path d="m4 14 6-6 2-3"></path>
                                <path d="M2 5h12"></path>
                                <path d="M7 2h1"></path>
                                <path d="m22 22-5-10-5 10"></path>
                                <path d="M14 18h6"></path>
                            </svg>
                        </div>
                        <div style="display:flex;align-items:center;gap:0.5rem;">
                            <h3 style="font-weight:700;">Idiomas</h3>
                            <span class="badge" id="badge-lang">0</span>
                        </div>
                    </div>
                    <button id="btn-add-lang"
                        style="background:var(--color-gray-900);color:var(--color-gray-50);border:none;padding:0.4rem 1rem;border-radius:0.5rem;font-weight:700;font-size:0.8125rem;cursor:pointer;display:flex;align-items:center;gap:0.25rem;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg> Adicionar
                    </button>
                </div>
                <div id="languages-list"></div>
            </div>

            <!-- Projects Builder -->
            <div class="card" style="padding:1.5rem;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
                    <div style="display:flex;align-items:center;gap:0.75rem;">
                        <div
                            style="width:2.5rem;height:2.5rem;border-radius:var(--radius-sm);background:#ecfdf5;color:#059669;display:flex;align-items:center;justify-content:center;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                                </path>
                                <line x1="12" y1="11" x2="12" y2="17"></line>
                                <line x1="9" y1="14" x2="15" y2="14"></line>
                            </svg>
                        </div>
                        <div style="display:flex;align-items:center;gap:0.5rem;">
                            <h3 style="font-weight:700;">Projetos</h3>
                            <span class="badge" id="badge-proj">0</span>
                        </div>
                    </div>
                    <button id="btn-add-proj"
                        style="background:var(--color-gray-900);color:var(--color-gray-50);border:none;padding:0.4rem 1rem;border-radius:0.5rem;font-weight:700;font-size:0.8125rem;cursor:pointer;display:flex;align-items:center;gap:0.25rem;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg> Adicionar
                    </button>
                </div>
                <div id="projects-list"></div>
            </div>

            <!-- Certifications Builder -->
            <div class="card" style="padding:1.5rem;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
                    <div style="display:flex;align-items:center;gap:0.75rem;">
                        <div
                            style="width:2.5rem;height:2.5rem;border-radius:var(--radius-sm);background:#fff7ed;color:#ea580c;display:flex;align-items:center;justify-content:center;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="12" cy="8" r="6"></circle>
                                <path d="M15.477 12.89 17 21.5l-5-3.5-5 3.5 1.523-8.61"></path>
                            </svg>
                        </div>
                        <div style="display:flex;align-items:center;gap:0.5rem;">
                            <h3 style="font-weight:700;">Certificações</h3>
                            <span class="badge" id="badge-cert">0</span>
                        </div>
                    </div>
                    <button id="btn-add-cert"
                        style="background:var(--color-gray-900);color:var(--color-gray-50);border:none;padding:0.4rem 1rem;border-radius:0.5rem;font-weight:700;font-size:0.8125rem;cursor:pointer;display:flex;align-items:center;gap:0.25rem;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg> Adicionar
                    </button>
                </div>
                <div id="certifications-list"></div>
            </div>
        </div>
    </main>
</body>

</html>
