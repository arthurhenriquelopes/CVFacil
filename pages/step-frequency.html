<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência de envio | CvPorVaga</title>
    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.js"></script>
</head>

<body>
    <script type="module">
        import { injectStepHeader, injectStepFooter } from '/src/lib/layout.js';
        import { setState } from '/src/lib/store.js';
        injectStepHeader({ step: 2, backHref: '/pages/step-goal.html' });
        injectStepFooter({ id: 'btn-next', disabled: true });

        document.addEventListener('click', e => {
            const targetBtn = e.target.closest('#btn-next');
            if (targetBtn && targetBtn.style.pointerEvents !== 'none') {
                window.location.href = '/pages/step-profile.html';
                return;
            }

            const card = e.target.closest('[data-freq]');
            if (!card) return;
            document.querySelectorAll('[data-freq]').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            setState({ frequency: card.dataset.freq });
            const btn = document.getElementById('btn-next');
            btn.style.pointerEvents = 'auto';
            btn.style.opacity = '1';
        });
    </script>

    <main class="page-content step-content">
        <div style="text-align:center;max-width:48rem;margin:0 auto;">
            <div
                style="width:4rem;height:4rem;border:1px solid var(--color-gray-400);color:var(--color-gray-900);background:transparent;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
            </div>
            <h2
                style="font-size:clamp(1.75rem,4vw,2.5rem);font-weight:700;margin-bottom:0.75rem;letter-spacing:-0.025em;">
                Quantos currículos você envia por semana?</h2>
            <p
                style="color:var(--color-gray-500);font-weight:500;margin-bottom:3rem;max-width:28rem;margin-left:auto;margin-right:auto;">
                Isso nos ajuda a entender seu momento na busca por emprego.</p>

            <div class="grid grid-2" style="gap:1.5rem;max-width:40rem;margin:0 auto;">
                <div class="card" data-freq="0"
                    style="cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;">
                    <h3 style="font-weight:700;font-size:1.125rem;margin-bottom:0.25rem;">Nenhum ainda</h3>
                    <p style="font-size:0.875rem;color:var(--color-gray-500);">Estou começando agora</p>
                </div>
                <div class="card" data-freq="1-5"
                    style="cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;">
                    <h3 style="font-weight:700;font-size:1.125rem;margin-bottom:0.25rem;">1 a 5</h3>
                    <p style="font-size:0.875rem;color:var(--color-gray-500);">Algumas candidaturas</p>
                </div>
                <div class="card" data-freq="6-10"
                    style="cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;">
                    <h3 style="font-weight:700;font-size:1.125rem;margin-bottom:0.25rem;">6 a 10</h3>
                    <p style="font-size:0.875rem;color:var(--color-gray-500);">Estou ativo na busca</p>
                </div>
                <div class="card" data-freq="10+"
                    style="cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;">
                    <h3 style="font-weight:700;font-size:1.125rem;margin-bottom:0.25rem;">Mais de 10</h3>
                    <p style="font-size:0.875rem;color:var(--color-gray-500);">Candidatando bastante</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
