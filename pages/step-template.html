<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha o Modelo | CvPorVaga</title>
    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.js"></script>
</head>

<body>
    <script type="module">
        import { injectStepHeader, injectStepFooter } from '/src/lib/layout.js';
        import { getState, setState } from '/src/lib/store.js';
        injectStepHeader({ step: 7, backHref: '/pages/step-analysis.html' });
        injectStepFooter();

        const state = getState();
        if (state.template === 'classic') {
            document.querySelector('[data-template="classic"]')?.classList.add('selected');
            document.querySelector('[data-template="modern"]')?.classList.remove('selected');
        }

        document.addEventListener('click', e => {
            const targetBtn = e.target.closest('#btn-continue');
            if (targetBtn && targetBtn.style.pointerEvents !== 'none') {
                window.location.href = '/pages/step-generating.html';
                return;
            }

            const card = e.target.closest('[data-template]');
            if (!card) return;
            document.querySelectorAll('[data-template]').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            setState({ template: card.dataset.template });
        });
    </script>

    <main class="page-content step-content" style="max-width:var(--max-width);margin:0 auto;">
        <div style="text-align:center;margin-bottom:3rem;">
            <h2 style="font-size:clamp(1.75rem,4vw,2.5rem);font-weight:700;letter-spacing:-0.025em;">Escolha o Modelo
            </h2>
            <p style="color:var(--color-gray-500);font-weight:500;">Selecione o layout que melhor destaca sua
                experiência.</p>
        </div>

        <div class="space-y-6" style="max-width:48rem;margin:0 auto;">
            <!-- Modern -->
            <div class="card selected" data-template="modern"
                style="cursor:pointer;display:flex;align-items:center;gap:2rem;padding:1.5rem;">
                <div
                    style="width:8rem;height:11rem;border-radius:var(--radius-sm);border:1px solid var(--color-gray-100);padding:0.75rem;flex-shrink:0;overflow:hidden;">
                    <div
                        style="width:100%;height:3px;background:var(--color-primary);border-radius:0;margin-bottom:0.5rem;">
                    </div>
                    <div
                        style="width:50%;height:2px;background:var(--color-gray-200);border-radius:0;margin-bottom:1rem;">
                    </div>
                    <div
                        style="width:100%;height:2px;background:var(--color-gray-100);border-radius:0;margin-bottom:0.35rem;">
                    </div>
                    <div
                        style="width:100%;height:2px;background:var(--color-gray-100);border-radius:0;margin-bottom:0.35rem;">
                    </div>
                    <div
                        style="width:80%;height:2px;background:var(--color-gray-100);border-radius:0;margin-bottom:0.35rem;">
                    </div>
                    <div style="width:100%;height:2px;background:var(--color-gray-100);border-radius:0;"></div>
                </div>
                <div style="flex:1;">
                    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">
                        <div
                            style="width:2rem;height:2rem;background:var(--color-primary);border-radius:0.5rem;display:flex;align-items:center;justify-content:center;color:white;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M12 2v20"></path>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                        </div>
                        <h3 style="font-weight:700;font-size:1.5rem;color:var(--color-primary);">Moderno</h3>
                    </div>
                    <p style="color:var(--color-gray-500);font-weight:500;line-height:1.6;">Limpo e direto. Layout
                        alinhado à esquerda. Perfeito para tecnologia e startups.</p>
                </div>
            </div>

            <!-- Classic -->
            <div class="card" data-template="classic"
                style="cursor:pointer;display:flex;align-items:center;gap:2rem;padding:1.5rem;">
                <div
                    style="width:8rem;height:11rem;border-radius:var(--radius-sm);border:1px solid var(--color-gray-100);padding:0.75rem;flex-shrink:0;overflow:hidden;">
                    <div
                        style="width:60%;height:2px;background:var(--color-gray-400);border-radius:0;margin:0 auto 0.25rem;">
                    </div>
                    <div
                        style="width:35%;height:2px;background:var(--color-gray-200);border-radius:0;margin:0 auto 1rem;">
                    </div>
                    <div
                        style="width:100%;height:2px;background:var(--color-gray-100);border-radius:0;margin-bottom:0.35rem;">
                    </div>
                    <div
                        style="width:100%;height:2px;background:var(--color-gray-100);border-radius:0;margin-bottom:0.35rem;">
                    </div>
                    <div
                        style="width:100%;height:2px;background:var(--color-gray-100);border-radius:0;margin-bottom:0.35rem;">
                    </div>
                    <div style="width:65%;height:2px;background:var(--color-gray-100);border-radius:0;"></div>
                </div>
                <div style="flex:1;">
                    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">
                        <div
                            style="width:2rem;height:2rem;background:var(--color-gray-100);border-radius:0.5rem;display:flex;align-items:center;justify-content:center;color:var(--color-gray-400);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                        </div>
                        <h3 style="font-weight:700;font-size:1.5rem;">Clássico</h3>
                    </div>
                    <p style="color:var(--color-gray-500);font-weight:500;line-height:1.6;">Elegante e tradicional.
                        Ideal para áreas jurídicas e corporativas.</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
