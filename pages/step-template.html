<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha o Modelo | CvPorVaga</title>
    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.js"></script>
</head>

<body>
    <script type="module">
        import { injectStepHeader, injectStepFooter } from '/src/lib/layout.js';
        import { getState, setState } from '/src/lib/store.js';
        injectStepHeader({ step: 6, backHref: '/pages/step-ats-result.html' });
        injectStepFooter();

        const state = getState();
        if (state.template === 'classic') {
            document.querySelector('[data-template="classic"]')?.classList.add('selected');
            document.querySelector('[data-template="modern"]')?.classList.remove('selected');
        }

        document.addEventListener('click', e => {
            const targetBtn = e.target.closest('#btn-continue');
            if (targetBtn && targetBtn.style.pointerEvents !== 'none') {
                window.location.href = '/pages/step-generating.html';
                return;
            }

            const card = e.target.closest('[data-template]');
            if (!card) return;
            document.querySelectorAll('[data-template]').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            setState({ template: card.dataset.template });
        });
    </script>

    <main class="page-content step-content" style="max-width:var(--max-width);margin:0 auto;">
        <div style="text-align:center;margin-bottom:3rem;">
            <h2 style="font-size:clamp(1.75rem,4vw,2.5rem);font-weight:700;letter-spacing:-0.025em;">Escolha o Modelo
            </h2>
            <p style="color:var(--color-gray-500);font-weight:500;">Selecione o layout que melhor destaca sua
                experiência.</p>
        </div>

        <div class="space-y-6" style="max-width:48rem;margin:0 auto;">
            <!-- Modern -->
            <div class="card selected" data-template="modern"
                style="cursor:pointer;display:flex;align-items:center;gap:2rem;padding:1.5rem;">
                <!-- Modern Template Skeleton Preview -->
                <div
                    style="width:9rem;height:12rem;border-radius:var(--radius-sm);border:1px solid var(--color-border);flex-shrink:0;overflow:hidden;display:flex;background:var(--color-bg);">
                    <!-- Left sidebar -->
                    <div style="width:35%;background:rgba(59,130,246,0.08);padding:0.4rem;display:flex;flex-direction:column;gap:0.35rem;">
                        <!-- Avatar circle -->
                        <div style="width:1.25rem;height:1.25rem;border-radius:50%;background:rgba(59,130,246,0.2);margin:0 auto 0.2rem;"></div>
                        <!-- Name -->
                        <div style="width:90%;height:2px;background:rgba(59,130,246,0.35);border-radius:1px;margin:0 auto;"></div>
                        <!-- Title -->
                        <div style="width:70%;height:1.5px;background:rgba(59,130,246,0.2);border-radius:1px;margin:0 auto 0.3rem;"></div>
                        <!-- Contact section -->
                        <div style="width:85%;height:1.5px;background:rgba(255,255,255,0.06);border-radius:1px;"></div>
                        <div style="width:75%;height:1.5px;background:rgba(255,255,255,0.06);border-radius:1px;"></div>
                        <div style="width:60%;height:1.5px;background:rgba(255,255,255,0.06);border-radius:1px;margin-bottom:0.2rem;"></div>
                        <!-- Skills section label -->
                        <div style="width:55%;height:1.5px;background:rgba(59,130,246,0.25);border-radius:1px;"></div>
                        <!-- Skill tags -->
                        <div style="display:flex;flex-wrap:wrap;gap:2px;">
                            <div style="width:1rem;height:3px;background:rgba(59,130,246,0.15);border-radius:1px;"></div>
                            <div style="width:1.2rem;height:3px;background:rgba(59,130,246,0.15);border-radius:1px;"></div>
                            <div style="width:0.8rem;height:3px;background:rgba(59,130,246,0.15);border-radius:1px;"></div>
                            <div style="width:1.1rem;height:3px;background:rgba(59,130,246,0.15);border-radius:1px;"></div>
                        </div>
                    </div>
                    <!-- Right content -->
                    <div style="flex:1;padding:0.5rem;display:flex;flex-direction:column;gap:0.3rem;">
                        <!-- Section: Experience -->
                        <div style="width:45%;height:2px;background:rgba(59,130,246,0.3);border-radius:1px;margin-bottom:0.15rem;"></div>
                        <div style="width:60%;height:1.5px;background:rgba(255,255,255,0.12);border-radius:1px;"></div>
                        <div style="width:40%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;"></div>
                        <div style="display:flex;align-items:center;gap:2px;margin-top:1px;">
                            <div style="width:1.5px;height:1.5px;border-radius:50%;background:rgba(255,255,255,0.1);"></div>
                            <div style="width:85%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;"></div>
                        </div>
                        <div style="display:flex;align-items:center;gap:2px;">
                            <div style="width:1.5px;height:1.5px;border-radius:50%;background:rgba(255,255,255,0.1);"></div>
                            <div style="width:75%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;"></div>
                        </div>
                        <div style="display:flex;align-items:center;gap:2px;">
                            <div style="width:1.5px;height:1.5px;border-radius:50%;background:rgba(255,255,255,0.1);"></div>
                            <div style="width:90%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;"></div>
                        </div>
                        <!-- Section: Education -->
                        <div style="width:40%;height:2px;background:rgba(59,130,246,0.3);border-radius:1px;margin-top:0.3rem;margin-bottom:0.15rem;"></div>
                        <div style="width:70%;height:1.5px;background:rgba(255,255,255,0.12);border-radius:1px;"></div>
                        <div style="width:50%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;"></div>
                        <!-- Section: Projects -->
                        <div style="width:35%;height:2px;background:rgba(59,130,246,0.3);border-radius:1px;margin-top:0.3rem;margin-bottom:0.15rem;"></div>
                        <div style="width:65%;height:1.5px;background:rgba(255,255,255,0.12);border-radius:1px;"></div>
                        <div style="width:80%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;"></div>
                    </div>
                </div>
                <div style="flex:1;">
                    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">
                        <div
                            style="width:2rem;height:2rem;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:0.5rem;display:flex;align-items:center;justify-content:center;color:rgba(59,130,246,0.8);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5">
                                <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>
                            </svg>
                        </div>
                        <h3 style="font-weight:700;font-size:1.5rem;color:var(--color-text);">Moderno</h3>
                    </div>
                    <p style="color:var(--color-text-secondary);font-weight:500;line-height:1.6;">Limpo e direto. Layout
                        em duas colunas com sidebar. Perfeito para tecnologia e startups.</p>
                </div>
            </div>

            <!-- Classic -->
            <div class="card" data-template="classic"
                style="cursor:pointer;display:flex;align-items:center;gap:2rem;padding:1.5rem;">
                <!-- Classic Template Skeleton Preview -->
                <div
                    style="width:9rem;height:12rem;border-radius:var(--radius-sm);border:1px solid var(--color-border);padding:0.5rem 0.6rem;flex-shrink:0;overflow:hidden;background:var(--color-bg);display:flex;flex-direction:column;align-items:center;">
                    <!-- Centered name -->
                    <div style="width:55%;height:2.5px;background:rgba(255,255,255,0.2);border-radius:1px;margin-bottom:0.15rem;"></div>
                    <!-- Title -->
                    <div style="width:40%;height:1.5px;background:rgba(255,255,255,0.1);border-radius:1px;margin-bottom:0.15rem;"></div>
                    <!-- Contact line -->
                    <div style="width:75%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;margin-bottom:0.3rem;"></div>
                    <!-- Divider -->
                    <div style="width:100%;height:1px;background:rgba(255,255,255,0.08);margin-bottom:0.35rem;"></div>
                    <!-- Section: Summary -->
                    <div style="width:35%;height:1.5px;background:rgba(255,255,255,0.15);border-radius:1px;margin-bottom:0.2rem;align-self:flex-start;"></div>
                    <div style="width:100%;height:1px;background:rgba(255,255,255,0.05);border-radius:1px;margin-bottom:2px;align-self:flex-start;"></div>
                    <div style="width:90%;height:1px;background:rgba(255,255,255,0.05);border-radius:1px;margin-bottom:0.3rem;align-self:flex-start;"></div>
                    <!-- Divider -->
                    <div style="width:100%;height:1px;background:rgba(255,255,255,0.08);margin-bottom:0.35rem;"></div>
                    <!-- Section: Experience -->
                    <div style="width:40%;height:1.5px;background:rgba(255,255,255,0.15);border-radius:1px;margin-bottom:0.2rem;align-self:flex-start;"></div>
                    <div style="width:55%;height:1.5px;background:rgba(255,255,255,0.1);border-radius:1px;margin-bottom:2px;align-self:flex-start;"></div>
                    <div style="width:35%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;margin-bottom:2px;align-self:flex-start;"></div>
                    <div style="display:flex;align-items:center;gap:2px;align-self:flex-start;">
                        <div style="width:1.5px;height:1.5px;border-radius:50%;background:rgba(255,255,255,0.08);"></div>
                        <div style="width:4rem;height:1px;background:rgba(255,255,255,0.05);border-radius:1px;"></div>
                    </div>
                    <div style="display:flex;align-items:center;gap:2px;align-self:flex-start;margin-bottom:0.3rem;">
                        <div style="width:1.5px;height:1.5px;border-radius:50%;background:rgba(255,255,255,0.08);"></div>
                        <div style="width:3.5rem;height:1px;background:rgba(255,255,255,0.05);border-radius:1px;"></div>
                    </div>
                    <!-- Divider -->
                    <div style="width:100%;height:1px;background:rgba(255,255,255,0.08);margin-bottom:0.35rem;"></div>
                    <!-- Section: Education -->
                    <div style="width:45%;height:1.5px;background:rgba(255,255,255,0.15);border-radius:1px;margin-bottom:0.2rem;align-self:flex-start;"></div>
                    <div style="width:60%;height:1px;background:rgba(255,255,255,0.08);border-radius:1px;margin-bottom:2px;align-self:flex-start;"></div>
                    <div style="width:40%;height:1px;background:rgba(255,255,255,0.05);border-radius:1px;align-self:flex-start;"></div>
                </div>
                <div style="flex:1;">
                    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">
                        <div
                            style="width:2rem;height:2rem;background:var(--color-accent-dim);border:1px solid var(--color-border);border-radius:0.5rem;display:flex;align-items:center;justify-content:center;color:var(--color-text-secondary);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                        </div>
                        <h3 style="font-weight:700;font-size:1.5rem;">Clássico</h3>
                    </div>
                    <p style="color:var(--color-text-secondary);font-weight:500;line-height:1.6;">Elegante e tradicional.
                        Layout centralizado com seções separadas. Ideal para áreas jurídicas e corporativas.</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
