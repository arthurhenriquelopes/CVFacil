<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo do Currículo | CvPorVaga</title>
    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.js"></script>
</head>

<body>
    <script type="module">
        import { injectStepHeader, injectStepFooter } from '/src/lib/layout.js';
        import { getState, setState } from '/src/lib/store.js';
        injectStepHeader({ step: 5, backHref: '/pages/step-ats-result.html' });
        injectStepFooter();

        // Set the professional template as default
        setState({ template: 'professional' });

        document.addEventListener('click', e => {
            const targetBtn = e.target.closest('#btn-continue');
            if (targetBtn && targetBtn.style.pointerEvents !== 'none') {
                window.location.href = '/pages/step-cert-review.html';
                return;
            }
        });
    </script>

    <main class="page-content step-content" style="max-width:var(--max-width);margin:0 auto;">
        <div style="text-align:center;margin-bottom:3rem;">
            <h2 style="font-size:clamp(1.75rem,4vw,2.5rem);font-weight:700;letter-spacing:-0.025em;">Modelo do Currículo
            </h2>
            <p style="color:var(--color-gray-500);font-weight:500;">Seu currículo será gerado no formato profissional otimizado para ATS.</p>
        </div>

        <div class="space-y-6" style="max-width:48rem;margin:0 auto;">
            <!-- Professional Template Preview -->
            <div class="card selected" style="display:flex;align-items:center;gap:2rem;padding:1.5rem;">
                <!-- Professional Template Skeleton Preview -->
                <div
                    style="width:9rem;height:12rem;border-radius:var(--radius-sm);border:1px solid var(--color-border);padding:0.5rem 0.6rem;flex-shrink:0;overflow:hidden;background:var(--color-bg);display:flex;flex-direction:column;align-items:center;">
                    <!-- Centered name -->
                    <div style="width:60%;height:3px;background:rgba(255,255,255,0.2);border-radius:1px;margin-bottom:0.2rem;"></div>
                    <!-- Contact line -->
                    <div style="width:80%;height:1.5px;background:rgba(255,255,255,0.1);border-radius:1px;margin-bottom:0.25rem;"></div>
                    <!-- Divider -->
                    <div style="width:100%;height:1px;background:rgba(255,255,255,0.15);margin-bottom:0.35rem;"></div>
                    <!-- Section: Resumo -->
                    <div style="width:50%;height:1.5px;background:rgba(255,255,255,0.18);border-radius:1px;margin-bottom:0.15rem;align-self:flex-start;letter-spacing:0.2em;"></div>
                    <div style="width:100%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;margin-bottom:2px;align-self:flex-start;"></div>
                    <div style="width:95%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;margin-bottom:0.3rem;align-self:flex-start;"></div>
                    <!-- Divider -->
                    <div style="width:100%;height:1px;background:rgba(255,255,255,0.15);margin-bottom:0.35rem;"></div>
                    <!-- Section: Experiência -->
                    <div style="width:65%;height:1.5px;background:rgba(255,255,255,0.18);border-radius:1px;margin-bottom:0.15rem;align-self:flex-start;"></div>
                    <div style="display:flex;justify-content:space-between;width:100%;margin-bottom:2px;">
                        <div style="width:50%;height:1.5px;background:rgba(255,255,255,0.12);border-radius:1px;"></div>
                        <div style="width:30%;height:1.5px;background:rgba(255,255,255,0.08);border-radius:1px;"></div>
                    </div>
                    <div style="width:35%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;margin-bottom:2px;align-self:flex-start;font-style:italic;"></div>
                    <div style="display:flex;align-items:center;gap:2px;align-self:flex-start;">
                        <div style="width:1.5px;height:1.5px;border-radius:50%;background:rgba(255,255,255,0.1);"></div>
                        <div style="width:4.5rem;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;"></div>
                    </div>
                    <div style="display:flex;align-items:center;gap:2px;align-self:flex-start;margin-bottom:0.3rem;">
                        <div style="width:1.5px;height:1.5px;border-radius:50%;background:rgba(255,255,255,0.1);"></div>
                        <div style="width:4rem;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;"></div>
                    </div>
                    <!-- Divider -->
                    <div style="width:100%;height:1px;background:rgba(255,255,255,0.15);margin-bottom:0.35rem;"></div>
                    <!-- Section: Habilidades -->
                    <div style="width:58%;height:1.5px;background:rgba(255,255,255,0.18);border-radius:1px;margin-bottom:0.15rem;align-self:flex-start;"></div>
                    <div style="width:100%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;margin-bottom:2px;align-self:flex-start;"></div>
                    <div style="width:85%;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;align-self:flex-start;"></div>
                </div>
                <div style="flex:1;">
                    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">
                        <div
                            style="width:2rem;height:2rem;background:var(--color-accent-dim);border:1px solid var(--color-border);border-radius:0.5rem;display:flex;align-items:center;justify-content:center;color:var(--color-text-secondary);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                        </div>
                        <h3 style="font-weight:700;font-size:1.5rem;">Profissional</h3>
                    </div>
                    <p style="color:var(--color-text-secondary);font-weight:500;line-height:1.6;">Layout clássico e profissional.
                        Coluna única com tipografia serif, cabeçalhos com espaçamento elegante. Otimizado para ATS e impressão A4.</p>
                    <div style="margin-top:1rem;display:flex;flex-wrap:wrap;gap:0.5rem;">
                        <span style="font-size:0.75rem;padding:0.25rem 0.5rem;border-radius:var(--radius-sm);background:rgba(34,197,94,0.1);color:var(--color-success);font-weight:600;">✓ ATS Optimized</span>
                        <span style="font-size:0.75rem;padding:0.25rem 0.5rem;border-radius:var(--radius-sm);background:rgba(59,130,246,0.1);color:#3b82f6;font-weight:600;">✓ A4 Perfeito</span>
                        <span style="font-size:0.75rem;padding:0.25rem 0.5rem;border-radius:var(--radius-sm);background:rgba(168,85,247,0.1);color:#a855f7;font-weight:600;">✓ Editável</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
