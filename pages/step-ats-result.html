<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado ATS | CvPorVaga</title>
    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.js"></script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--color-gray-50);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        * { box-sizing: border-box; }

        header {
            background: transparent;
            border-bottom: 1px solid var(--color-gray-200);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        a { text-decoration: none; transition: color 0.2s; }

        .header-link {
            color: var(--color-gray-800);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
        }

        .header-link:hover { color: var(--color-gray-500); }

        .new-test-link {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-gray-500);
        }

        .new-test-link:hover { color: var(--color-gray-800); }

        .main-grid { display: grid; gap: 1.5rem; }
        @media (min-width: 768px) { .main-grid { grid-template-columns: repeat(3, 1fr); } }
        .col-span-2 { grid-column: span 2 / span 2; }
        .main-grid-2 { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 768px) { .main-grid-2 { grid-template-columns: 1fr 1fr; } }
    </style>
</head>

<body>
    <header>
        <div style="display:flex; align-items:center; gap:1rem;">
            <a href="/pages/step-ats-scanner.html" class="header-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
                ATS Scanner Pro
            </a>
        </div>
        <div>
            <a href="/pages/step-ats-scanner.html" class="new-test-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
                Novo Teste
            </a>
        </div>
    </header>

    <div id="render-target" style="flex: 1;">
        <!-- Content injected by JS -->
    </div>

    <script type="module" src="/src/pages/ats-result.js"></script>
</body>

</html>
