<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado ATS | CvPorVaga</title>
    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-gray-50);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        * {
            box-sizing: border-box;
        }

        header {
            background: white;
            border-bottom: 1px solid var(--color-gray-100);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        a {
            text-decoration: none;
            transition: color 0.2s;
        }

        .header-link {
            color: var(--color-gray-800);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
        }

        .header-link:hover {
            color: var(--color-primary);
        }

        .new-test-link {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-gray-500);
        }

        .new-test-link:hover {
            color: var(--color-gray-800);
        }

        .main-grid {
            display: grid;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .main-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .col-span-2 {
            grid-column: span 2 / span 2;
        }
    </style>
</head>

<body>
    <header>
        <div style="display:flex; align-items:center; gap:1rem;">
            <a href="/pages/step-ats-scanner.html" class="header-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
                ATS Scanner Pro
            </a>
        </div>
        <div>
            <a href="/pages/step-ats-scanner.html" class="new-test-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
                Novo Teste
            </a>
        </div>
    </header>

    <div id="render-target" style="flex: 1;">
        <!-- Content injected by JS -->
    </div>

    <script type="module">
        import { getState } from '/src/lib/store.js';

        const state = getState();
        const res = state.analysisResult;

        if (!res) {
            window.location.href = '/pages/dashboard.html';
        }

        // Se 'ats' não existir, cria um baseado na proporção real com a nota base 10
        const ats = res.ats || {
            score: Math.round(
                (res.matchPercentage / 100) * 40 +
                (res.matchPercentage / 100) * 30 +
                (res.matchPercentage / 100) * 20 +
                10
            ) || 33,
            classification: (res.matchPercentage >= 70) ? "Aprovado pelo ATS" : "Reprovado automaticamente pelo ATS",
            risk: (res.matchPercentage >= 70) ? "BAIXO" : "ALTO",
            summary: "O seu currículo foi analisado com base nas palavras-chave e requisitos da vaga.",
            breakdown: {
                hardSkills: { score: Math.round((res.matchPercentage / 100) * 40), max: 40 },
                experience: { score: Math.round((res.matchPercentage / 100) * 30), max: 30 },
                keywords: { score: Math.round((res.matchPercentage / 100) * 20), max: 20 },
                education: { score: Math.round((res.matchPercentage / 100) * 10), max: 10 }
            },
            criticalGaps: res.suggestions?.slice(0, 3) || ["Ausência de palavras-chave adequadas"],
            missingKeywords: res.keywords?.filter(k => !(res.matchedKeywords || []).includes(k)) || ["Node.js", "TypeScript"],
            matchedKeywords: res.matchedKeywords || ["Docker", "PostgreSQL"],
            strengths: (res.highlightableExperiences || []).map(e => e.reason),
            tips: res.suggestions?.map(s => ({ text: s, impact: 'alto' })) || []
        };

        const isApproved = ats.score >= 70;
        const colorMain = isApproved ? 'var(--color-success)' : 'var(--color-error)';
        const badgeStyle = isApproved
            ? 'background:#dcfce7; color:#15803d;'
            : 'background:#fee2e2; color:#b91c1c;';
        const badgeText = isApproved ? 'APROVAR' : 'REPROVAR';

        const criticalGapsHtml = ats.criticalGaps.map(g => \`
            <li style="font-size:0.875rem; color:var(--color-error); display:flex; align-items:flex-start; gap:0.5rem; margin-bottom:0.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; margin-top:0.25rem;"><circle cx="12" cy="12" r="10"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg>
                \${g}
            </li>
        \`).join('');

        const missingKwHtml = ats.missingKeywords.map(k => \`
            <span style="padding:0.25rem 0.75rem; background:#fef2f2; color:#b91c1c; border:1px solid #fee2e2; border-radius:0.5rem; font-size:0.875rem; font-weight:500;">\${k}</span>
        \`).join('');

        const matchedKwHtml = ats.matchedKeywords.map(k => \`
            <span style="padding:0.25rem 0.75rem; background:#f0fdf4; color:#15803d; border:1px solid #dcfce7; border-radius:0.5rem; font-size:0.875rem;">\${k}</span>
        \`).join('');

        const strengthsHtml = ats.strengths.map(s => \`
            <li style="display:flex; align-items:flex-start; gap:0.75rem; font-size:0.875rem; color:var(--color-gray-600); margin-bottom:1rem;">
                <div style="width:0.375rem; height:0.375rem; border-radius:50%; background:var(--color-success); margin-top:0.375rem; flex-shrink:0;"></div>
                \${s}
            </li>
        \`).join('');

        const tipsHtml = ats.tips.map(t => \`
            <li style="display:flex; align-items:flex-start; gap:0.75rem; font-size:0.875rem; color:var(--color-gray-600); margin-bottom:1rem;">
                <div style="width:0.375rem; height:0.375rem; border-radius:50%; background:\${t.impact === 'alto' ? 'var(--color-error)' : 'var(--color-warning)'}; margin-top:0.375rem; flex-shrink:0;"></div>
                <span style="\${t.impact === 'alto' ? 'font-weight:600; color:var(--color-gray-800);' : ''}">\${t.text}</span>
            </li>
        \`).join('');

        const finalMarkup = \`
        <div style="width:100%; max-width:64rem; margin:0 auto; padding:2rem 1rem;">
            <div style="display:grid; gap:1.5rem;" class="main-grid">
                <!-- Top Summary Grid -->
                <div class="col-span-2" style="background:white; border-radius:1rem; padding:2rem; box-shadow:var(--shadow-sm); border:1px solid var(--color-gray-200);">
                    <div style="display:flex; align-items:flex-start; justify-content:space-between;">
                        <div>
                            <h2 style="font-size:1.875rem; font-weight:800; color:var(--color-gray-900); margin:0;">Resultado da Análise</h2>
                            <p style="color:var(--color-gray-500); font-weight:500; margin-top:0.25rem; font-size:0.875rem;">Baseado nos critérios de +50 ATS do mercado</p>
                        </div>
                        <div style="padding:0.25rem 1rem; border-radius:9999px; font-size:0.75rem; font-weight:800; letter-spacing:0.05em; \${badgeStyle}">\${badgeText}</div>
                    </div>
                    
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:2rem; margin-top:1.5rem;">
                        <div>
                            <div style="font-size:0.875rem; color:var(--color-gray-500); font-weight:800; text-transform:uppercase; margin-bottom:0.25rem;">Score Geral</div>
                            <div style="font-size:3.75rem; font-weight:900; color:\${colorMain}; line-height:1;">\${ats.score}<span style="font-size:1.5rem; color:var(--color-gray-300); font-weight:400;">/100</span></div>
                        </div>
                        <div>
                            <div style="font-size:0.875rem; color:var(--color-gray-400); font-weight:800; text-transform:uppercase; margin-bottom:0.25rem;">Classificação</div>
                            <div style="font-size:1.25rem; font-weight:800; color:var(--color-gray-800); line-height:1.2;">\${ats.classification}</div>
                            <div style="margin-top:0.5rem; display:flex; align-items:center; gap:0.5rem;">
                                <div style="width:0.75rem; height:0.75rem; border-radius:50%; background:\${colorMain};"></div>
                                <span style="font-size:0.875rem; color:var(--color-gray-600);">Risco de Rejeição: <strong>\${ats.risk}</strong></span>
                            </div>
                        </div>
                    </div>
                    <p style="color:var(--color-gray-600); font-weight:500; line-height:1.6; border-top:1px solid var(--color-gray-100); padding-top:1.5rem; margin-top:1.5rem;">\${ats.summary}</p>
                </div>
                
                <div style="background:var(--color-gray-50); border-radius:1rem; padding:1.5rem; border:1px solid var(--color-gray-200);">
                    <h3 style="font-weight:800; color:var(--color-gray-800); font-size:1.125rem; margin:0 0 1.5rem;">Composição da Nota</h3>
                    <div style="display:flex; flex-direction:column; gap:1rem;">
                        <div>
                            <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:0.25rem;"><span style="font-weight:800; color:var(--color-gray-600);">Hard Skills</span><span style="font-weight:800; color:var(--color-gray-800);">\${ats.breakdown.hardSkills.score}/\${ats.breakdown.hardSkills.max}</span></div>
                            <div style="height:0.625rem; width:100%; background:var(--color-gray-200); border-radius:999px; overflow:hidden;"><div style="height:100%; background:var(--color-error); width: \${(ats.breakdown.hardSkills.score / ats.breakdown.hardSkills.max) * 100}%;"></div></div>
                        </div>
                        <div>
                            <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:0.25rem;"><span style="font-weight:800; color:var(--color-gray-600);">Experiência</span><span style="font-weight:800; color:var(--color-gray-800);">\${ats.breakdown.experience.score}/\${ats.breakdown.experience.max}</span></div>
                            <div style="height:0.625rem; width:100%; background:var(--color-gray-200); border-radius:999px; overflow:hidden;"><div style="height:100%; background:var(--color-error); width: \${(ats.breakdown.experience.score / ats.breakdown.experience.max) * 100}%;"></div></div>
                        </div>
                        <div>
                            <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:0.25rem;"><span style="font-weight:800; color:var(--color-gray-600);">Palavras-chave</span><span style="font-weight:800; color:var(--color-gray-800);">\${ats.breakdown.keywords.score}/\${ats.breakdown.keywords.max}</span></div>
                            <div style="height:0.625rem; width:100%; background:var(--color-gray-200); border-radius:999px; overflow:hidden;"><div style="height:100%; background:var(--color-error); width: \${(ats.breakdown.keywords.score / ats.breakdown.keywords.max) * 100}%;"></div></div>
                        </div>
                        <div>
                            <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:0.25rem;"><span style="font-weight:800; color:var(--color-gray-600);">Formação</span><span style="font-weight:800; color:var(--color-gray-800);">\${ats.breakdown.education.score}/\${ats.breakdown.education.max}</span></div>
                            <div style="height:0.625rem; width:100%; background:var(--color-gray-200); border-radius:999px; overflow:hidden;"><div style="height:100%; background:var(--color-warning); width: \${(ats.breakdown.education.score / ats.breakdown.education.max) * 100}%;"></div></div>
                        </div>
                    </div>
                    
                    <div style="padding-top:1.25rem; border-top:1px solid var(--color-gray-200); margin-top:1.25rem;">
                        <div style="font-size:0.75rem; font-weight:800; color:var(--color-gray-500); text-transform:uppercase; margin-bottom:0.75rem;">Gaps Críticos</div>
                        <ul style="list-style:none; padding:0; margin:0;">
                            \${criticalGapsHtml}
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Keywords -->
            <div style="background:white; border:1px solid var(--color-gray-200); border-radius:1rem; overflow:hidden; box-shadow:var(--shadow-sm); margin-top:1.5rem;">
                <div style="padding:1.5rem; border-bottom:1px solid var(--color-gray-100); background:var(--color-gray-50);">
                    <h3 style="font-weight:800; font-size:1.125rem; display:flex; align-items:center; gap:0.5rem; color:var(--color-gray-800); margin:0;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#f59e0b;"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>
                        Palavras-chave Ausentes
                    </h3>
                    <p style="color:var(--color-gray-500); font-size:0.875rem; font-weight:500; margin:0.25rem 0 0;">Termos importantes da vaga que não foram encontrados no seu CV.</p>
                </div>
                <div style="padding:1.5rem;">
                    <div style="display:flex; flex-wrap:wrap; gap:0.5rem;">
                        \${missingKwHtml}
                    </div>
                    <div style="margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--color-gray-100);">
                        <h4 style="font-weight:800; font-size:0.875rem; color:var(--color-gray-700); margin:0 0 0.75rem;">Termos encontrados (Match)</h4>
                        <div style="display:flex; flex-wrap:wrap; gap:0.75rem;">
                            \${matchedKwHtml}
                        </div>
                    </div>
                </div>
            </div>

            <!-- Strengths and Tips -->
            <div style="display:grid; gap:1.5rem; margin-top:1.5rem;" class="main-grid-2">
                <style>
                    .main-grid-2 { grid-template-columns: 1fr; }
                    @media (min-width: 768px) { .main-grid-2 { grid-template-columns: 1fr 1fr; } }
                </style>
                <div style="background:white; border:1px solid var(--color-gray-200); border-radius:1rem; padding:1.5rem; box-shadow:var(--shadow-sm);">
                    <h3 style="font-weight:800; font-size:1.125rem; display:flex; align-items:center; gap:0.5rem; margin:0 0 1.25rem; color:var(--color-success);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-success);"><path d="M21.801 10A10 10 0 1 1 17 3.335"></path><path d="m9 11 3 3L22 4"></path></svg>
                        Pontos Fortes
                    </h3>
                    <ul style="list-style:none; padding:0; margin:0;">
                        \${strengthsHtml}
                    </ul>
                </div>
                <div style="background:white; border:1px solid var(--color-gray-200); border-radius:1rem; padding:1.5rem; box-shadow:var(--shadow-sm);">
                    <h3 style="font-weight:800; font-size:1.125rem; display:flex; align-items:center; gap:0.5rem; margin:0 0 1.25rem; color:var(--color-primary);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary);"><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>
                        Dicas de Otimização
                    </h3>
                    <ul style="list-style:none; padding:0; margin:0;">
                        \${tipsHtml}
                    </ul>
                </div>
            </div>

            <!-- Bottom CTA -->
            \${!isApproved ? \`
            <div style="background:var(--color-primary); border-radius:1rem; padding:2rem; margin-top:2rem; text-align:center; color:white; box-shadow:0 20px 25px -5px rgba(37, 99, 235, 0.4);">
                <div style="display:inline-flex; align-items:center; gap:0.5rem; padding:0.375rem 1rem; background:rgba(255,255,255,0.2); border-radius:999px; font-size:0.875rem; font-weight:800; margin-bottom:1rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>
                    Atenção: Seu CV está sendo eliminado
                </div>
                <h2 style="font-size:1.5rem; font-weight:900; margin:0 0 0.75rem;">Com esse score, você está perdendo vagas agora</h2>
                <p style="color:rgba(255,255,255,0.9); font-weight:500; max-width:40rem; margin:0 auto 2rem;">Enquanto você lê isso, outros candidatos com CVs otimizados estão sendo chamados para entrevista. Não deixe essa vaga escapar.</p>
                <div style="display:flex; justify-content:center; gap:1rem; flex-wrap:wrap;">
                    <a href="/pages/step-template.html" style="background:white; color:var(--color-primary); padding:1rem 2rem; border-radius:0.75rem; font-weight:900; box-shadow:var(--shadow-lg);">
                        🚀 Gerar currículo otimizado
                    </a>
                    <a href="/pages/step-ats-scanner.html" style="color:rgba(255,255,255,0.9); padding:1rem 1.5rem; border-radius:0.75rem; font-weight:700;">
                        Testar outra vaga
                    </a>
                </div>
            </div>\` : \`
            <div style="background:var(--color-success); border-radius:1rem; padding:2rem; margin-top:2rem; text-align:center; color:white; box-shadow:0 20px 25px -5px rgba(21, 128, 61, 0.4);">
                <h2 style="font-size:1.5rem; font-weight:900; margin:0 0 0.75rem;">Seu currículo está forte!</h2>
                <p style="color:rgba(255,255,255,0.9); font-weight:500; max-width:40rem; margin:0 auto 2rem;">Pode enviar com confiança, o ATS não será uma barreira para você.</p>
                <a href="/pages/step-ats-scanner.html" style="display:inline-flex; background:white; color:var(--color-success); padding:1rem 2rem; border-radius:0.75rem; font-weight:900; box-shadow:var(--shadow-lg);">
                    Testar outra vaga
                </a>
            </div>
            \`}
        </div>
        \`;

        document.getElementById('render-target').innerHTML = finalMarkup;
    </script>
</body>

</html>
