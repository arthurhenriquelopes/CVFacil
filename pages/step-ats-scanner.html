<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Scanner Pro | CvPorVaga</title>
    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.js"></script>
</head>

<body style=" padding-bottom: 6rem;">
    <!-- Basic minimal header -->
    <header
        style=" border-bottom:1px solid var(--color-gray-100); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem;">
        <a href="/pages/dashboard.html"
            style="color:var(--color-gray-800); text-decoration:none; display:flex; align-items:center;">
            <i class="pi pi-arrow-left" style="font-size:1rem;"></i>
        </a>
        <h1 style="font-size:0.875rem; font-weight:700; color:var(--color-gray-900); margin:0;">ATS Scanner Pro</h1>
    </header>

    <main class="page-content step-content" style="max-width:48rem; margin:0 auto; padding:4rem 1rem;">
        <div style="text-align:center; margin-bottom:3rem;">
            <h2
                style="font-size:clamp(1.5rem, 4vw, 2rem); font-weight:700; color:var(--color-gray-900); margin-bottom:0.75rem; letter-spacing:-0.025em;">
                Vamos descobrir o que está travando você</h2>
            <p
                style="color:var(--color-gray-500); font-weight:500; font-size:1rem; max-width: 36rem; margin:0 auto; line-height:1.6;">
                Envie seu CV atual e nossa IA vai simular exatamente como os robôs das empresas leem seu arquivo.</p>
        </div>

        <div class="card"
            style="padding:2.5rem;  max-width: 40rem; margin: 0 auto; border:1px solid var(--color-gray-300)">
            <div style="margin-bottom:1.5rem;" id="upload-header">
                <h3 style="font-size:0.95rem; font-weight:700; color:var(--color-gray-900); margin-bottom:0.25rem;">
                    Anexe seu currículo</h3>
                <p style="font-size:0.8125rem; font-weight:600; color:var(--color-gray-400);">PDF, max 5MB</p>
            </div>

            <label for="pdf-upload" id="drop-zone"
                style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:3.5rem 1.5rem; border:2px dashed var(--color-gray-300); border-radius:0.75rem; cursor:pointer;  transition:all 0.2s ease;">
                <div
                    style="width:3.5rem; height:3.5rem;  color:var(--color-gray-600); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:1rem;">
                    <i class="pi pi-upload" style="font-size:1.5rem;"></i>
                </div>
                <h4 style="font-size:0.95rem; font-weight:700; color:var(--color-gray-800); margin-bottom:0.25rem;">
                    Clique para upload ou arraste e solte</h4>
                <p style="font-size:0.8125rem; font-weight:500; color:var(--color-gray-400);">Arquivo único (Max 5 MB)
                </p>
                <input type="file" id="pdf-upload" accept="application/pdf" style="display:none;">
            </label>

            <!-- Selected State -->
            <div id="selected-state" style="display:none; text-align:center; padding-top:1rem;">
                <h3 style="font-size:1.25rem; font-weight:700; color:var(--color-gray-900); margin-bottom:0.25rem;">
                    Arquivo selecionado</h3>
                <p style="font-size:0.875rem; color:var(--color-gray-500); margin-bottom:2rem;">Este é o currículo que
                    será analisado pela nossa IA.</p>

                <div
                    style="display:flex; align-items:center; justify-content:space-between; padding:1rem 1.5rem; border:1px solid var(--color-gray-300); border-radius:0.75rem; text-align:left;">
                    <div style="display:flex; align-items:center; gap:1.25rem;">
                        <div
                            style="width:3rem; height:3rem; background:#fee2e2; color:#ef4444; border-radius:0.5rem; display:flex; align-items:center; justify-content:center;">
                            <i class="pi pi-file-pdf" style="font-size:1.5rem;"></i>
                        </div>
                        <div>
                            <p id="file-name"
                                style="font-size:0.875rem; font-weight:700; color:var(--color-gray-900); margin:0 0 0.15rem;">
                                Nome_do_arquivo.pdf</p>
                            <p id="file-size" style="font-size:0.75rem; color:var(--color-gray-500); margin:0;">0.00 MB
                            </p>
                        </div>
                    </div>
                    <button id="btn-remove"
                        style="background:transparent; border:none; color:var(--color-gray-500); cursor:pointer; padding:0.5rem; display:flex; align-items:center; justify-content:center; transition:color 0.2s;">
                        <i class="pi pi-times" style="font-size:1.125rem;"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Action Bar -->
    <div
        style="position:fixed; bottom:0; left:0; right:0; padding:1.5rem 1rem;  display:flex; justify-content:center; z-index:50;">
        <div style="width:100%; max-width:40rem;">
            <button id="btn-continue" disabled
                style="width:100%; height:3.5rem; border-radius:0.5rem; background:var(--color-gray-100); color:var(--color-gray-400); font-size:1rem; font-weight:700; border:none; transition:all 0.2s; cursor:not-allowed;">Continuar</button>
        </div>
    </div>

    <script type="module">
        import { setState } from '/src/lib/store.js';
        import { parseProfileFromText } from '/src/prompts/parse-profile.js';
        import { extractTextFromPDF } from '/src/lib/pdf.js';

        const input = document.getElementById('pdf-upload');
        const btn = document.getElementById('btn-continue');
        const dropZone = document.getElementById('drop-zone');

        const uploadHeader = document.getElementById('upload-header');
        const selectedState = document.getElementById('selected-state');
        const fileNameEl = document.getElementById('file-name');
        const fileSizeEl = document.getElementById('file-size');
        const btnRemove = document.getElementById('btn-remove');

        let selectedFile = null;

        input.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                if (selectedFile.size > 5 * 1024 * 1024) {
                    alert('Arquivo muito grande. O limite é 5MB.');
                    selectedFile = null;
                    input.value = '';
                    return;
                }
                dropZone.style.display = 'none';
                uploadHeader.style.display = 'none';
                selectedState.style.display = 'block';

                fileNameEl.textContent = selectedFile.name;
                fileSizeEl.textContent = (selectedFile.size / (1024 * 1024)).toFixed(2) + ' MB';

                btn.disabled = false;
                btn.style.background = 'var(--color-gray-900)'; // Blue primary
                btn.style.color = 'var(--color-gray-50)';
                btn.style.cursor = 'pointer';
            }
        });

        btnRemove.addEventListener('click', () => {
            selectedFile = null;
            input.value = '';

            dropZone.style.display = 'flex';
            uploadHeader.style.display = 'block';
            selectedState.style.display = 'none';

            btn.disabled = true;
            btn.style.background = 'var(--color-gray-100)';
            btn.style.color = 'var(--color-gray-400)';
            btn.style.cursor = 'not-allowed';
        });

        btn.addEventListener('click', async () => {
            if (!selectedFile) return;

            btn.disabled = true;
            btn.textContent = 'Processando arquivo...';

            try {
                // Extract PDF Text
                const fullText = await extractTextFromPDF(selectedFile);

                btn.textContent = 'Extraindo perfil...';

                // Call Sonar to parse
                const parsedData = await parseProfileFromText(fullText);

                // Ensure dynamic arrays exist
                ['experiences', 'education', 'skills', 'languages', 'projects', 'certifications'].forEach(k => {
                    if (!parsedData[k]) parsedData[k] = [];
                });

                // Flag this flow as ATS Scanner
                setState({ flow: 'ats', profile: parsedData });

                // Redirect to job description step
                window.location.href = '/pages/step-job.html';

            } catch (err) {
                console.error(err);
                alert('Erro ao processar o PDF. Tente novamente.');
                btn.disabled = false;
                btn.textContent = 'Continuar';
            }
        });
    </script>
</body>

</html>
