services:
  backend:
    build:
      context: ./backend
    image: evoluicv-backend:local
    container_name: evoluicv-backend
    ports:
      - "8080:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?defina OPENAI_API_KEY no .env ou no ambiente}
      JAVA_OPTS: ${JAVA_OPTS:-}
    restart: unless-stopped
    networks:
      - evoluicv

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
        BACKEND_INTERNAL_URL: "http://backend:8080"
    image: evoluicv-frontend:local
    container_name: evoluicv-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      BACKEND_INTERNAL_URL: http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - evoluicv

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9095:9090"
    networks:
      - evoluicv

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - evoluicv

networks:
  evoluicv:
    name: evoluicv_network
    driver: bridge
