server:
  port: 8080

spring:
  application:
    name: evoluicv-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:}
      model-name: gpt-4o-mini
      temperature: 0.2
      response-format: json_schema
      strict-json-schema: true
      log-requests: false
      log-responses: false

logging:
  level:
    com.evoluicv.backend: INFO
    dev.langchain4j: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: evoluicv-backend